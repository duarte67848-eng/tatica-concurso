[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200
[[redirects]]
  from = "/_next/data/*"
  to = "/_next/data/:splat"
  status = 200
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200